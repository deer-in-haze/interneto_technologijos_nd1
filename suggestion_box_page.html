<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>ASTRAEUS | Suggestion Box</title>

  <meta name="description" content="Send feedback and suggestions about the ASTRAEUS astronomy website. Share your ideas and help improve the platform.">
  <meta name="keywords" content="suggestion box, feedback form, astronomy website, user feedback, contact form, space project">
  <meta name="author" content="Miglė Lukoševičiūtė">
  <meta name="robots" content="index, follow">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta property="og:title" content="ASTRAEUS | Suggestion Box">
  <meta property="og:description" content="Submit your feedback and ideas for improving the ASTRAEUS astronomy website.">
  <meta property="og:type" content="website">

  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-container">
    <a class="brand" href="./index.html">
      <img src="./images/logo.svg"
           alt="Astraeus"
           width="140"
           height="40">
    </a>

    <ul class="nav-menu">
      <li><a href="./index.html">Home</a></li>
      <li><a href="./sky_events_calendar_page.html">SKYCAL</a></li>
      <li><a href="./suggestion_box_page.html">Suggestion box</a></li>
    </ul>
  </div>
</nav>

<section class="suggestion-box">
  <h1 class="suggestion-title">Suggestion Box</h1>

  <form class="suggestion-form" action="#" method="post">
    <div class="form-group">
      <label for="name">Your Name</label>
      <input
              type="text"
              id="name"
              name="name"
              placeholder="Enter your name"
              required
      >
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
      >
    </div>

    <div class="form-group">
      <label for="category">Suggestion Type</label>
      <select id="category" name="category" required>
        <option value="">Choose one...</option>
        <option>Website</option>
        <option>Content</option>
        <option>Design</option>
        <option>Feature</option>
        <option>Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="message">Your Suggestion</label>
      <textarea
              id="message"
              name="message"
              rows="5"
              placeholder="Write your suggestion here..."
              required
      ></textarea>
    </div>

    <div class="form-group">
      <label>How helpful is our site?</label>

      <div class="radio-group">
        <label>
          <input type="radio" name="rating" value="1" required>
          1
        </label>

        <label>
          <input type="radio" name="rating" value="2">
          2
        </label>

        <label>
          <input type="radio" name="rating" value="3">
          3
        </label>

        <label>
          <input type="radio" name="rating" value="4">
          4
        </label>

        <label>
          <input type="radio" name="rating" value="5">
          5
        </label>
      </div>
    </div>

    <button type="submit" class="btn submit-btn">
      Send Suggestion
    </button>
  </form>
</section>

</body>
</html>
